<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Report — CloudHero AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Fraunces:ital,wght@1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #070B14;
      --navy-2: #0D1424;
      --navy-3: #111827;
      --navy-4: #1a2235;
      --cyan: #00D9FF;
      --cyan-dim: rgba(0,217,255,0.12);
      --cyan-glow: rgba(0,217,255,0.25);
      --green: #00E5A0;
      --purple: #7B6FFF;
      --amber: #FFB547;
      --red: #FF5F57;
      --white: #F0F4FF;
      --muted: #7A8CAB;
      --faint: #3D4F6A;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(0,217,255,0.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    @media (prefers-reduced-motion: reduce) { html, body { transition: none; } }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
      background: var(--navy-2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 100;
      transition: transform 0.3s ease;
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700;
      color: var(--white); text-decoration: none; letter-spacing: -0.5px;
      border-bottom: 1px solid var(--border); margin-bottom: 12px;
    }
    .sidebar-logo span { color: var(--cyan); }
    .nav-items { flex: 1; padding: 4px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; margin: 2px 12px; border-radius: 8px;
      text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500;
      transition: all 0.15s ease; border-left: 2px solid transparent;
    }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
    .nav-item.active { background: var(--cyan-dim); color: var(--cyan); border-left-color: var(--cyan); }
    .nav-item svg { flex-shrink: 0; opacity: 0.8; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-bottom { padding: 16px 20px; border-top: 1px solid var(--border); }
    .user-email { font-size: 12px; color: var(--muted); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .signout-link { font-size: 13px; color: var(--faint); text-decoration: none; cursor: pointer; transition: color 0.15s; }
    .signout-link:hover { color: var(--red); }

    .hamburger {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 200;
      background: var(--navy-2); border: 1px solid var(--border); border-radius: 8px;
      width: 40px; height: 40px; align-items: center; justify-content: center;
      cursor: pointer; flex-direction: column; gap: 5px; padding: 8px;
    }
    .hamburger span { display: block; width: 18px; height: 2px; background: var(--white); border-radius: 2px; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: flex; }
      .sidebar-overlay.open { display: block; }
      .main-content { margin-left: 0 !important; }
    }

    /* Main */
    .main-content {
      margin-left: 220px;
      min-height: 100vh;
      padding: 40px 40px 120px;
    }

    /* Report header */
    .report-header { margin-bottom: 32px; }
    .report-header h1 { font-size: 30px; font-weight: 700; margin-bottom: 8px; }
    .report-meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
      color: var(--muted); font-size: 14px; margin-bottom: 20px;
    }
    .report-meta span { display: flex; align-items: center; gap: 6px; }

    .summary-chips { display: flex; flex-wrap: wrap; gap: 12px; }
    .chip {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      text-align: center;
    }
    .chip-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .chip-value { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--white); }
    .chip-value.green { color: var(--green); }

    /* Skeleton */
    .skeleton {
      height: 20px; background: var(--navy-3); border-radius: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    @media (prefers-reduced-motion: reduce) { .skeleton { animation: none; } }

    /* AI Summary */
    .ai-card {
      background: var(--cyan-dim);
      border: 1px solid var(--border-bright);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .ai-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .ai-text { font-size: 14px; line-height: 1.75; color: var(--white); }

    /* Findings sections */
    .findings-section { margin-bottom: 20px; }
    .findings-header {
      display: flex; align-items: center; gap: 10px;
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s;
    }
    .findings-header:hover { border-color: var(--border-bright); }
    .findings-header.open { border-radius: 12px 12px 0 0; border-bottom-color: transparent; }

    .category-icon { font-size: 18px; flex-shrink: 0; }
    .category-name { flex: 1; font-weight: 600; font-size: 15px; }
    .category-count {
      background: var(--navy-3);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .category-waste {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--amber);
    }
    .chevron {
      color: var(--faint);
      transition: transform 0.2s;
    }
    .findings-header.open .chevron { transform: rotate(180deg); }

    .findings-body {
      display: none;
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }
    .findings-body.open { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      white-space: nowrap;
    }
    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--white);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }

    .mono { font-family: 'Space Mono', monospace; font-size: 12px; }

    .badge-sev {
      display: inline-block;
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .sev-low { background: rgba(122,140,171,0.15); color: var(--muted); border: 1px solid rgba(122,140,171,0.2); }
    .sev-medium { background: rgba(255,181,71,0.12); color: var(--amber); border: 1px solid rgba(255,181,71,0.25); }
    .sev-high { background: rgba(255,95,87,0.12); color: var(--red); border: 1px solid rgba(255,95,87,0.25); }

    input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--green);
      cursor: pointer;
    }

    /* Sticky action bar */
    .action-bar {
      position: fixed;
      bottom: 0; left: 220px; right: 0;
      background: var(--navy-2);
      border-top: 1px solid var(--border);
      padding: 16px 40px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 50;
    }
    .action-bar.visible { display: flex; }
    .action-bar-info { font-size: 14px; color: var(--white); }
    .action-bar-info strong { color: var(--green); font-family: 'Space Mono', monospace; }
    .btn-apply {
      padding: 12px 28px;
      background: var(--green);
      border: none;
      border-radius: 10px;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.2s;
      white-space: nowrap;
    }
    .btn-apply:hover { filter: brightness(1.08); }
    .btn-apply:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

    @media (max-width: 768px) {
      .action-bar { left: 0; padding: 16px 20px; flex-direction: column; align-items: stretch; }
    }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 440px;
      width: 90%;
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .btn-cancel {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: var(--border-bright); color: var(--white); }
    .btn-confirm {
      padding: 10px 24px;
      background: var(--green);
      border: none;
      border-radius: 8px;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.2s;
    }
    .btn-confirm:hover { filter: brightness(1.08); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

    /* Banners */
    .success-banner {
      display: none;
      padding: 14px 20px;
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.25);
      border-radius: 10px;
      color: var(--green);
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .error-banner {
      display: none;
      padding: 14px 20px;
      background: rgba(255,95,87,0.1);
      border: 1px solid rgba(255,95,87,0.2);
      border-radius: 10px;
      color: var(--red);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .failed-state {
      text-align: center;
      padding: 60px 40px;
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 480px;
    }
    .failed-state h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--red); }
    .failed-state p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .btn-retry {
      display: inline-block;
      padding: 12px 24px;
      background: var(--cyan);
      border: none;
      border-radius: 10px;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: filter 0.2s;
    }
    .btn-retry:hover { filter: brightness(1.1); }

    @media (max-width: 1000px) {
      .main-content { padding: 24px 16px 120px; }
      table { font-size: 12px; }
    }
  </style>

<body>
  <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <a href="/" class="sidebar-logo">Cloud<span>Hero</span> AI</a>
    <nav class="nav-items">
      <a href="/savings/app/dashboard.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/savings/app/connect.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Connect AWS
      </a>
      <a href="/savings/app/audit.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Run Audit
      </a>
      <a href="/savings/app/report.html" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Reports
      </a>
      <a href="/savings/app/billing.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Billing
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-email" id="user-email">Loading...</div>
      <a class="signout-link" onclick="signOut()">Sign out</a>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <div id="report-container">
      <!-- Loaded dynamically -->
      <div style="color:var(--muted);font-size:14px;padding:40px 0;">Loading report...</div>
    </div>
  </main>

  <!-- Sticky action bar -->
  <div class="action-bar" id="action-bar">
    <div class="action-bar-info">
      <span id="selection-label">0 findings selected</span> — <strong id="selection-savings">$0</strong>/month potential savings
    </div>
    <button class="btn-apply" id="apply-btn" onclick="confirmApply()">Apply selected fixes →</button>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h3>Apply fixes?</h3>
      <p id="modal-body">This will mark selected resources for remediation. Apply?</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" id="confirm-btn" onclick="applyFixes()">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    const token = () => localStorage.getItem('ch_token');

    async function apiFetch(path, opts = {}) {
      const res = await fetch(API + path, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token()}`,
          ...(opts.headers || {})
        }
      });
      if (res.status === 401) {
        localStorage.removeItem('ch_token');
        window.location.href = '/savings/app/login.html';
        return;
      }
      return res;
    }

    async function requireAuth() {
      if (!token()) { window.location.href = '/savings/app/login.html'; return null; }
      const res = await apiFetch('/api/auth/me');
      if (!res || !res.ok) {
        localStorage.removeItem('ch_token');
        window.location.href = '/savings/app/login.html';
        return null;
      }
      const _d = await res.json(); return _d.user || _d;
    }

    function signOut() { localStorage.removeItem('ch_token'); window.location.href = '/savings/app/login.html'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

    const auditId = new URLSearchParams(window.location.search).get('audit_id');

    // Category icons
    const CATEGORY_ICONS = {
      ec2: '🖥️', ebs: '💿', snapshots: '📷', snapshot: '📷',
      'elastic ip': '🌐', elastic_ip: '🌐', rds: '🗃️',
      s3: '🪣', default: '📦'
    };

    function getCategoryIcon(name) {
      const key = (name || '').toLowerCase().replace(/\s+/g, ' ').trim();
      for (const [k, v] of Object.entries(CATEGORY_ICONS)) {
        if (key.includes(k)) return v;
      }
      return CATEGORY_ICONS.default;
    }

    function fmt(n) {
      if (n === null || n === undefined) return '—';
      return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function sevBadge(sev) {
      const s = (sev || '').toLowerCase();
      if (s === 'high') return '<span class="badge-sev sev-high">High</span>';
      if (s === 'medium') return '<span class="badge-sev sev-medium">Medium</span>';
      return '<span class="badge-sev sev-low">Low</span>';
    }

    // Track selected findings
    let allFindings = [];
    let selectedIds = new Set();

    function toggleFinding(id, cost) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      updateActionBar();
    }

    function updateActionBar() {
      const actionBar = document.getElementById('action-bar');
      if (selectedIds.size === 0) {
        actionBar.classList.remove('visible');
        return;
      }
      actionBar.classList.add('visible');

      // Calculate total savings for selected
      let totalSavings = 0;
      selectedIds.forEach(id => {
        const finding = allFindings.find(f => f.id === id);
        if (finding) totalSavings += Number(finding.monthly_cost || finding.monthlyCost || 0);
      });

      document.getElementById('selection-label').textContent = `${selectedIds.size} finding${selectedIds.size !== 1 ? 's' : ''} selected`;
      document.getElementById('selection-savings').textContent = fmt(totalSavings);
    }

    function confirmApply() {
      const count = selectedIds.size;
      const totalSavings = allFindings
        .filter(f => selectedIds.has(f.id))
        .reduce((sum, f) => sum + Number(f.monthly_cost || f.monthlyCost || 0), 0);

      document.getElementById('modal-body').textContent =
        `This will mark ${count} resource${count !== 1 ? 's' : ''} for remediation (${fmt(totalSavings)}/month savings). Apply?`;
      document.getElementById('modal-backdrop').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
    }

    async function applyFixes() {
      const confirmBtn = document.getElementById('confirm-btn');
      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Applying...';

      try {
        const res = await apiFetch('/api/fix/apply', {
          method: 'POST',
          body: JSON.stringify({ finding_ids: [...selectedIds] })
        });
        closeModal();

        if (res && res.ok) {
          const count = selectedIds.size;
          const banner = document.getElementById('success-banner');
          banner.textContent = `✓ ${count} fix${count !== 1 ? 'es' : ''} applied! We're processing the changes.`;
          banner.style.display = 'block';
          banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
          selectedIds.clear();
          updateActionBar();
          // Uncheck all checkboxes
          document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        } else {
          const data = res ? await res.json().catch(() => ({})) : {};
          const errBanner = document.getElementById('error-banner');
          errBanner.textContent = data.message || 'Failed to apply fixes. Please try again.';
          errBanner.style.display = 'block';
        }
      } catch (e) {
        closeModal();
        const errBanner = document.getElementById('error-banner');
        errBanner.textContent = 'Network error. Please try again.';
        errBanner.style.display = 'block';
      }
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Confirm';
    }

    function toggleSection(id) {
      const header = document.getElementById('header-' + id);
      const body = document.getElementById('body-' + id);
      header.classList.toggle('open');
      body.classList.toggle('open');
    }

    function renderReport(data) {
      const container = document.getElementById('report-container');

      const status = (data.status || '').toLowerCase();
      if (status === 'failed') {
        container.innerHTML = `
          <div class="failed-state">
            <h2>⚠️ Audit Failed</h2>
            <p>${data.error || data.message || 'This audit encountered an error and could not complete.'}</p>
            <a href="/savings/app/audit.html" class="btn-retry">Try again →</a>
          </div>
        `;
        return;
      }

      const date = data.created_at || data.date || data.completedAt;
      const dateStr = date ? new Date(date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) : 'Unknown date';
      const account = data.account_id || data.accountId || '—';
      const regionCount = data.regions_scanned || data.regionCount || data.regions?.length || '—';
      const resourcesScanned = data.resources_scanned ?? data.resourcesScanned ?? '—';
      const findings = data.findings || [];
      const totalFindings = data.total_findings ?? data.totalFindings ?? findings.length;
      const monthlySavings = data.total_monthly_savings ?? data.totalMonthlySavings ?? data.monthly_waste ?? null;

      // Collect all individual findings across categories
      allFindings = [];
      if (Array.isArray(findings)) {
        findings.forEach(category => {
          const items = category.items || category.findings || [];
          items.forEach(item => {
            allFindings.push({
              id: item.id || `${category.category}-${item.resource_id || Math.random()}`,
              monthly_cost: item.monthly_cost || item.monthlyCost || 0,
              severity: item.severity || 'low',
              ...item
            });
          });
        });
      }

      // Pre-select all high-severity findings
      allFindings.forEach(f => {
        if ((f.severity || '').toLowerCase() === 'high') {
          selectedIds.add(f.id);
        }
      });

      const findingsSections = Array.isArray(findings) ? findings.map((cat, idx) => {
        const catName = cat.category || cat.name || `Category ${idx + 1}`;
        const icon = getCategoryIcon(catName);
        const items = cat.items || cat.findings || [];
        const catWaste = cat.monthly_waste || cat.monthlyWaste ||
          items.reduce((sum, i) => sum + Number(i.monthly_cost || i.monthlyCost || 0), 0);
        const sectionId = `cat-${idx}`;

        const rows = items.map(item => {
          const fId = item.id || `${catName}-${item.resource_id || Math.random()}`;
          const isHigh = (item.severity || '').toLowerCase() === 'high';
          return `
            <tr>
              <td class="mono">${item.resource_id || item.resourceId || '—'}</td>
              <td>${item.name || item.resource_name || '—'}</td>
              <td class="mono">${item.region || '—'}</td>
              <td class="mono" style="color:var(--amber)">${fmt(item.monthly_cost || item.monthlyCost)}</td>
              <td>${sevBadge(item.severity)}</td>
              <td><input type="checkbox" data-id="${fId}" data-cost="${item.monthly_cost || item.monthlyCost || 0}"
                ${isHigh ? 'checked' : ''} onchange="toggleFinding('${fId}', ${item.monthly_cost || 0})"></td>
            </tr>
          `;
        }).join('');

        return `
          <div class="findings-section">
            <div class="findings-header open" id="header-${sectionId}" onclick="toggleSection('${sectionId}')">
              <span class="category-icon">${icon}</span>
              <span class="category-name">${catName}</span>
              <span class="category-count">${items.length}</span>
              <span class="category-waste">${fmt(catWaste)}/mo</span>
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="findings-body open" id="body-${sectionId}">
              <div style="overflow-x:auto;">
                <table>
                  <thead>
                    <tr>
                      <th>Resource ID</th>
                      <th>Name</th>
                      <th>Region</th>
                      <th>Monthly Cost</th>
                      <th>Severity</th>
                      <th>Fix</th>
                    </tr>
                  </thead>
                  <tbody>${rows || '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:20px;">No findings in this category</td></tr>'}</tbody>
                </table>
              </div>
            </div>
          </div>
        `;
      }).join('') : '';

      container.innerHTML = `
        <div id="success-banner" class="success-banner"></div>
        <div id="error-banner" class="error-banner"></div>

        <div class="report-header">
          <h1>Savings Audit Report</h1>
          <div class="report-meta">
            <span>📅 ${dateStr}</span>
            <span>☁️ ${account}</span>
            <span>🗺️ ${regionCount} region${regionCount !== 1 ? 's' : ''} scanned</span>
          </div>
          <div class="summary-chips">
            <div class="chip">
              <div class="chip-label">Resources Scanned</div>
              <div class="chip-value">${resourcesScanned}</div>
            </div>
            <div class="chip">
              <div class="chip-label">Findings</div>
              <div class="chip-value">${totalFindings}</div>
            </div>
            <div class="chip">
              <div class="chip-label">Monthly Savings</div>
              <div class="chip-value green">${fmt(monthlySavings)}</div>
            </div>
          </div>
        </div>

        <div class="ai-card">
          <div class="ai-label">🤖 AI Analysis</div>
          <div class="ai-text" id="ai-summary-text">${data.ai_summary || '<div class="skeleton" style="width:90%;margin-bottom:8px;"></div><div class="skeleton" style="width:75%;"></div>'}</div>
        </div>

        ${findings.length === 0 ? `
          <div style="text-align:center;padding:48px;color:var(--muted);">
            <p style="font-size:16px;color:var(--white);margin-bottom:8px;">No findings to display</p>
            <p>Great news — no significant waste was detected in your AWS account.</p>
          </div>
        ` : findingsSections}
        <div id="billing-activation-panel"></div>
        <div id="savings-forecast-panel"></div>
      `;

      // Update action bar after rendering
      updateActionBar();
    }

    function renderActivationPanel(activationData) {
      const panel = document.getElementById('billing-activation-panel');
      if (!panel) return;
      if (!activationData?.show_activation_prompt) { panel.innerHTML = ''; return; }

      const savings = activationData.savings_monthly || 0;
      const fee = activationData.suggested_fee || (savings * 0.15);
      const net = activationData.net_savings || (savings - fee);
      const annual = net * 12;

      panel.innerHTML = `
        <div style="background:linear-gradient(135deg,#0d2b1e 0%,#0a1628 100%);border:2px solid #10b981;border-radius:16px;padding:32px;margin-top:32px;text-align:center;">
          <div style="font-size:28px;margin-bottom:12px;">🎉</div>
          <h2 style="font-size:22px;color:#10b981;margin-bottom:8px;">We found real savings in your account</h2>
          <p style="color:#9ca3af;margin-bottom:28px;font-size:15px;">Your audit identified <strong style="color:#e5e7eb">$${savings.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}/month</strong> in waste. Activate billing so we can start working on it together.</p>

          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;max-width:700px;margin-left:auto;margin-right:auto;">
            <div style="background:#111827;border-radius:10px;padding:16px;">
              <div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Waste Identified</div>
              <div style="font-size:24px;font-weight:700;color:#f59e0b;">$${savings.toLocaleString('en-US',{maximumFractionDigits:0})}/mo</div>
            </div>
            <div style="background:#111827;border-radius:10px;padding:16px;">
              <div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Our Fee (15%)</div>
              <div style="font-size:24px;font-weight:700;color:#06b6d4;">$${fee.toLocaleString('en-US',{maximumFractionDigits:0})}/mo</div>
            </div>
            <div style="background:linear-gradient(135deg,#064e3b,#0a1628);border:1px solid #10b981;border-radius:10px;padding:16px;">
              <div style="font-size:11px;color:#6ee7b7;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">You Keep</div>
              <div style="font-size:24px;font-weight:700;color:#10b981;">$${net.toLocaleString('en-US',{maximumFractionDigits:0})}/mo</div>
            </div>
          </div>

          <p style="color:#6b7280;font-size:13px;margin-bottom:20px;">We don't make money until you do. 30-day free trial. Cancel anytime.</p>
          <button onclick="activateBilling(${savings})" style="background:#10b981;color:#fff;border:none;padding:14px 36px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;" onmouseover="this.style.background='#059669'" onmouseout="this.style.background='#10b981'">
            Activate — Keep $${net.toLocaleString('en-US',{maximumFractionDigits:0})}/mo →
          </button>
          <div id="activate-error" style="color:#f87171;font-size:13px;margin-top:12px;display:none;"></div>
        </div>
      `;

      // Savings forecast panel
      const forecast = document.getElementById('savings-forecast-panel');
      if (forecast) {
        const months = [1,2,3,6,9,12];
        const rows = months.map(m => `
          <tr>
            <td style="color:#9ca3af">Month ${m}</td>
            <td style="color:#f59e0b">$${(savings * m).toLocaleString('en-US',{maximumFractionDigits:0})}</td>
            <td style="color:#06b6d4">$${(fee * m).toLocaleString('en-US',{maximumFractionDigits:0})}</td>
            <td style="color:#10b981;font-weight:600">$${(net * m).toLocaleString('en-US',{maximumFractionDigits:0})}</td>
          </tr>`).join('');

        forecast.innerHTML = `
          <div style="background:#111827;border:1px solid #1f2937;border-radius:12px;padding:24px;margin-top:20px;">
            <h3 style="font-size:16px;color:#e5e7eb;margin-bottom:4px;">📈 12-Month Savings Forecast</h3>
            <p style="font-size:13px;color:#6b7280;margin-bottom:16px;">If you apply these findings and maintain savings, here's your projected outcome:</p>
            <table style="width:100%;border-collapse:collapse;font-size:14px;">
              <thead><tr>
                <th style="text-align:left;color:#6b7280;font-size:11px;text-transform:uppercase;padding:8px 0;border-bottom:1px solid #1f2937">Timeline</th>
                <th style="text-align:left;color:#6b7280;font-size:11px;text-transform:uppercase;padding:8px 0;border-bottom:1px solid #1f2937">Cumulative Waste Saved</th>
                <th style="text-align:left;color:#6b7280;font-size:11px;text-transform:uppercase;padding:8px 0;border-bottom:1px solid #1f2937">Hero Savings Fee</th>
                <th style="text-align:left;color:#6b7280;font-size:11px;text-transform:uppercase;padding:8px 0;border-bottom:1px solid #1f2937">Net in Your Pocket</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <div style="background:#064e3b;border-radius:8px;padding:14px;margin-top:16px;display:flex;justify-content:space-between;align-items:center;">
              <span style="color:#6ee7b7;font-size:14px;font-weight:600">📅 12-Month Net Savings</span>
              <span style="color:#10b981;font-size:22px;font-weight:700">$${annual.toLocaleString('en-US',{maximumFractionDigits:0})}</span>
            </div>
          </div>
        `;
      }
    }

    async function activateBilling(savingsMonthly) {
      const errEl = document.getElementById('activate-error');
      errEl.style.display = 'none';
      try {
        const res = await apiFetch('/api/billing/activate', {
          method: 'POST',
          body: JSON.stringify({ audit_id: auditId, savings_monthly: savingsMonthly })
        });
        if (!res) return;
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else if (data.already_active) {
          errEl.textContent = '✓ Billing already active on your account.';
          errEl.style.color = '#10b981';
          errEl.style.display = 'block';
        } else {
          errEl.textContent = data.error || 'Failed to start checkout. Please try again.';
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
      }
    }

    async function loadReport() {
      if (!auditId) {
        document.getElementById('report-container').innerHTML = `
          <div style="color:var(--red);padding:40px 0;">
            No audit ID specified. <a href="/savings/app/dashboard.html" style="color:var(--cyan);">Go to Dashboard</a>
          </div>
        `;
        return;
      }

      try {
        // Fetch both report data and activation data in parallel
        const [reportRes, activationRes] = await Promise.all([
          apiFetch(`/api/audit/${auditId}/report`),
          apiFetch(`/api/audit/${auditId}`)
        ]);

        if (!reportRes || !reportRes.ok) {
          if (!activationRes || !activationRes.ok) {
            document.getElementById('report-container').innerHTML = `
              <div class="failed-state">
                <h2>⚠️ Report Not Found</h2>
                <p>Could not load this audit report. It may still be processing.</p>
                <a href="/savings/app/dashboard.html" class="btn-retry">Back to Dashboard</a>
              </div>
            `;
            return;
          }
          const data2 = await activationRes.json();
          renderReport(data2);
          renderActivationPanel(data2);
          return;
        }

        const [reportData, activationData] = await Promise.all([
          reportRes.json(),
          activationRes ? activationRes.json().catch(() => null) : null
        ]);

        renderReport(reportData);
        renderActivationPanel(activationData);
      } catch (e) {
        document.getElementById('report-container').innerHTML = `
          <div class="failed-state">
            <h2>⚠️ Error Loading Report</h2>
            <p>Network error. Please try again.</p>
            <a href="/savings/app/dashboard.html" class="btn-retry">Back to Dashboard</a>
          </div>
        `;
      }
    }

    (async () => {
      const user = await requireAuth();
      if (!user) return;
      document.getElementById('user-email').textContent = user.email || 'Account';
      await loadReport();
      document.fonts.ready.then(() => { document.body.style.opacity = '1'; });
      setTimeout(() => { document.body.style.opacity = '1'; }, 500);
    })();
  </script>
</body>
</html>
