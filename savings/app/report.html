<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>html{background:#070B14;color:#F0F4FF}</style>
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Report — CloudHero AI</title>
        <style>
    :root {
      --navy: #070B14;
      --navy-2: #0D1424;
      --navy-3: #111827;
      --navy-4: #1a2235;
      --cyan: #00D9FF;
      --cyan-dim: rgba(0,217,255,0.12);
      --cyan-glow: rgba(0,217,255,0.25);
      --green: #00E5A0;
      --purple: #7B6FFF;
      --amber: #FFB547;
      --red: #FF5F57;
      --white: #F0F4FF;
      --muted: #7A8CAB;
      --faint: #3D4F6A;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(0,217,255,0.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;}
    @media (prefers-reduced-motion: reduce) { html, body { transition: none; } }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
      background: var(--navy-2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 100;
      transition: transform 0.3s ease;
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700;
      color: var(--white); text-decoration: none; letter-spacing: -0.5px;
      border-bottom: 1px solid var(--border); margin-bottom: 12px;
    }
    .sidebar-logo span { color: var(--cyan); }
    .nav-items { flex: 1; padding: 4px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; margin: 2px 12px; border-radius: 8px;
      text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500;
      transition: all 0.15s ease; border-left: 2px solid transparent;
    }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
    .nav-item.active { background: var(--cyan-dim); color: var(--cyan); border-left-color: var(--cyan); }
    .nav-item svg { flex-shrink: 0; opacity: 0.8; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-bottom { padding: 16px 20px; border-top: 1px solid var(--border); }
    .user-email { font-size: 12px; color: var(--muted); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .signout-link { font-size: 13px; color: var(--faint); text-decoration: none; cursor: pointer; transition: color 0.15s; }
    .signout-link:hover { color: var(--red); }

    .hamburger {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 200;
      background: var(--navy-2); border: 1px solid var(--border); border-radius: 8px;
      width: 40px; height: 40px; align-items: center; justify-content: center;
      cursor: pointer; flex-direction: column; gap: 5px; padding: 8px;
    }
    .hamburger span { display: block; width: 18px; height: 2px; background: var(--white); border-radius: 2px; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: flex; }
      .sidebar-overlay.open { display: block; }
      .main-content { margin-left: 0 !important; }
    }

    /* Main */
    .main-content {
      margin-left: 220px;
      min-height: 100vh;
      padding: 40px 40px 120px;
    }

    /* Report header */
    .report-header { margin-bottom: 32px; }
    .report-header h1 { font-size: 30px; font-weight: 700; margin-bottom: 8px; }
    .report-meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
      color: var(--muted); font-size: 14px; margin-bottom: 20px;
    }
    .report-meta span { display: flex; align-items: center; gap: 6px; }

    .summary-chips { display: flex; flex-wrap: wrap; gap: 12px; }
    .chip {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      text-align: center;
    }
    .chip-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .chip-value { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--white); }
    .chip-value.green { color: var(--green); }

    /* Skeleton */
    .skeleton {
      height: 20px; background: var(--navy-3); border-radius: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    @media (prefers-reduced-motion: reduce) { .skeleton { animation: none; } }

    /* AI Summary */
    .ai-card {
      background: var(--cyan-dim);
      border: 1px solid var(--border-bright);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .ai-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .ai-text { font-size: 14px; line-height: 1.75; color: var(--white); }

    /* Findings sections */
    .findings-section { margin-bottom: 20px; }
    .findings-header {
      display: flex; align-items: center; gap: 10px;
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s;
    }
    .findings-header:hover { border-color: var(--border-bright); }
    .findings-header.open { border-radius: 12px 12px 0 0; border-bottom-color: transparent; }

    .category-icon { font-size: 18px; flex-shrink: 0; }
    .category-name { flex: 1; font-weight: 600; font-size: 15px; }
    .category-count {
      background: var(--navy-3);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .category-waste {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--amber);
    }
    .chevron {
      color: var(--faint);
      transition: transform 0.2s;
    }
    .findings-header.open .chevron { transform: rotate(180deg); }

    .findings-body {
      display: none;
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }
    .findings-body.open { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      white-space: nowrap;
    }
    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--white);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }

    .mono { font-family: 'Space Mono', monospace; font-size: 12px; }

    .badge-sev {
      display: inline-block;
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .sev-low { background: rgba(122,140,171,0.15); color: var(--muted); border: 1px solid rgba(122,140,171,0.2); }
    .sev-medium { background: rgba(255,181,71,0.12); color: var(--amber); border: 1px solid rgba(255,181,71,0.25); }
    .sev-high { background: rgba(255,95,87,0.12); color: var(--red); border: 1px solid rgba(255,95,87,0.25); }

    input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--green);
      cursor: pointer;
    }
    .row-fixed td { opacity: 0.45; text-decoration: line-through; }
    .row-fixed td:last-child { opacity: 1; text-decoration: none; }

    /* Sticky action bar */
    .action-bar {
      position: fixed;
      bottom: 0; left: 220px; right: 0;
      background: var(--navy-2);
      border-top: 1px solid var(--border);
      padding: 16px 40px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 50;
    }
    .action-bar.visible { display: flex; }
    .action-bar-info { font-size: 14px; color: var(--white); }
    .action-bar-info strong { color: var(--green); font-family: 'Space Mono', monospace; }
    .btn-apply {
      padding: 12px 28px;
      background: var(--green);
      border: none;
      border-radius: 10px;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.2s;
      white-space: nowrap;
    }
    .btn-apply:hover { filter: brightness(1.08); }
    .btn-apply:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

    @media (max-width: 768px) {
      .action-bar { left: 0; padding: 16px 20px; flex-direction: column; align-items: stretch; }
    }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 440px;
      width: 90%;
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .btn-cancel {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: var(--border-bright); color: var(--white); }
    .btn-confirm {
      padding: 10px 24px;
      background: var(--green);
      border: none;
      border-radius: 8px;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.2s;
    }
    .btn-confirm:hover { filter: brightness(1.08); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

    /* Banners */
    .success-banner {
      display: none;
      padding: 14px 20px;
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.25);
      border-radius: 10px;
      color: var(--green);
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .error-banner {
      display: none;
      padding: 14px 20px;
      background: rgba(255,95,87,0.1);
      border: 1px solid rgba(255,95,87,0.2);
      border-radius: 10px;
      color: var(--red);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .failed-state {
      text-align: center;
      padding: 60px 40px;
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 480px;
    }
    .failed-state h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--red); }
    .failed-state p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .btn-retry {
      display: inline-block;
      padding: 12px 24px;
      background: var(--cyan);
      border: none;
      border-radius: 10px;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: filter 0.2s;
    }
    .btn-retry:hover { filter: brightness(1.1); }

    @media (max-width: 1000px) {
      .main-content { padding: 24px 16px 120px; }
      table { font-size: 12px; }
    }
  </style>

<body>
  <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <a href="/" class="sidebar-logo">Cloud<span>Hero</span> AI</a>
    <nav class="nav-items">
      <a href="/savings/app/dashboard.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/savings/app/connect.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Connect Cloud
      </a>
      <a href="/savings/app/audit.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Run Audit
      </a>
      <a href="/savings/app/report.html" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Reports
      </a>
      <a href="/savings/app/billing.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Billing
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-email" id="user-email">Loading...</div>
      <a class="signout-link" onclick="signOut()">Sign out</a>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <div id="report-container">
      <!-- Loaded dynamically -->
      <div style="color:var(--muted);font-size:14px;padding:40px 0;">Loading report...</div>
    </div>
  </main>

  <!-- Sticky action bar -->
  <div class="action-bar" id="action-bar">
    <div class="action-bar-info">
      <span id="selection-label">0 findings selected</span> — <strong id="selection-savings">$0</strong>/month potential savings
    </div>
    <button class="btn-apply" id="apply-btn" onclick="confirmApply()">Apply selected fixes →</button>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" style="max-width:520px;">
      <h3 id="modal-title">Apply fixes?</h3>
      <p id="modal-body">This will mark selected resources for remediation. Apply?</p>
      <div id="modal-results" style="display:none;max-height:220px;overflow-y:auto;margin-bottom:16px;font-size:13px;"></div>
      <div class="modal-actions" id="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" id="confirm-btn" onclick="applyFixes()">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // Always reveal body — must be top-level, never inside async
    
    setTimeout(() => { }, 300);

    const API = '';
    const token = () => localStorage.getItem('ch_token');

    async function apiFetch(path, opts = {}) {
      const res = await fetch(API + path, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token()}`,
          ...(opts.headers || {})
        }
      });
      if (res.status === 401) {
        localStorage.removeItem('ch_token');
        window.location.href = '/savings/app/login.html';
        return;
      }
      return res;
    }

    async function requireAuth() {
      if (!token()) { window.location.href = '/savings/app/login.html'; return null; }
      const res = await apiFetch('/api/auth/me');
      if (!res || !res.ok) {
        localStorage.removeItem('ch_token');
        window.location.href = '/savings/app/login.html';
        return null;
      }
      const _d = await res.json(); return _d.user || _d;
    }

    function signOut() { localStorage.removeItem('ch_token'); window.location.href = '/savings/app/login.html'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

    const auditId = new URLSearchParams(window.location.search).get('audit_id');

    // Category icons
    const CATEGORY_ICONS = {
      ec2: '🖥️', ebs: '💿', snapshots: '📷', snapshot: '📷',
      'elastic ip': '🌐', elastic_ip: '🌐', rds: '🗃️',
      s3: '🪣', default: '📦'
    };

    function getCategoryIcon(name) {
      const key = (name || '').toLowerCase().replace(/\s+/g, ' ').trim();
      for (const [k, v] of Object.entries(CATEGORY_ICONS)) {
        if (key.includes(k)) return v;
      }
      return CATEGORY_ICONS.default;
    }

    function fmt(n) {
      if (n === null || n === undefined) return '—';
      return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function sevBadge(sev) {
      const s = (sev || '').toLowerCase();
      if (s === 'high') return '<span class="badge-sev sev-high">High</span>';
      if (s === 'medium') return '<span class="badge-sev sev-medium">Medium</span>';
      return '<span class="badge-sev sev-low">Low</span>';
    }

    // Track selected findings
    let allFindings = [];
    let selectedIds = new Set();
    let pendingFindingIds = []; // IDs queued for the current modal action

    function toggleFinding(id, cost) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      updateActionBar();
    }

    function updateActionBar() {
      const actionBar = document.getElementById('action-bar');
      if (selectedIds.size === 0) {
        actionBar.classList.remove('visible');
        return;
      }
      actionBar.classList.add('visible');
      let totalSavings = 0;
      selectedIds.forEach(id => {
        const finding = allFindings.find(f => f.id === id);
        if (finding) totalSavings += Number(finding.monthly_cost || 0);
      });
      document.getElementById('selection-label').textContent = `${selectedIds.size} finding${selectedIds.size !== 1 ? 's' : ''} selected`;
      document.getElementById('selection-savings').textContent = fmt(totalSavings);
    }

    // Standard "Apply selected" button → confirm and apply only checked items
    function confirmApply() {
      pendingFindingIds = [...selectedIds];
      const count = pendingFindingIds.length;
      const totalSavings = allFindings
        .filter(f => pendingFindingIds.includes(f.id))
        .reduce((sum, f) => sum + Number(f.monthly_cost || 0), 0);
      document.getElementById('modal-title').textContent = 'Apply selected fixes?';
      document.getElementById('modal-body').textContent =
        `This will apply ${count} fix${count !== 1 ? 'es' : ''} directly in your cloud account (${fmt(totalSavings)}/mo savings). This cannot be undone.`;
      document.getElementById('modal-results').style.display = 'none';
      document.getElementById('modal-actions').style.display = 'flex';
      document.getElementById('confirm-btn').textContent = 'Confirm';
      document.getElementById('modal-backdrop').classList.add('open');
    }

    // Auto-fix all fixable findings — select them all then confirm
    function autoFixAll() {
      const fixable = allFindings.filter(f => f.fix_available && !f.fix_applied && f.id);
      if (!fixable.length) { alert('No auto-fixable findings remaining.'); return; }
      pendingFindingIds = fixable.map(f => f.id);
      const totalSavings = fixable.reduce((s, f) => s + f.monthly_cost, 0);
      document.getElementById('modal-title').textContent = `⚡ Auto-Fix ${fixable.length} finding${fixable.length !== 1 ? 's' : ''}?`;
      document.getElementById('modal-body').innerHTML =
        `This will automatically remediate <strong style="color:#06b6d4;">${fixable.length} issue${fixable.length !== 1 ? 's' : ''}</strong> in your cloud account, recovering <strong style="color:#10b981;">${fmt(totalSavings)}/month</strong>.<br><br>
        <span style="font-size:12px;color:#9ca3af;">Actions: stop idle EC2s · delete unattached EBS volumes · release unused Elastic IPs · delete old snapshots.</span>`;
      document.getElementById('modal-results').style.display = 'none';
      document.getElementById('modal-actions').style.display = 'flex';

      const fixable = allFindings.filter(f => f.fix_available && !f.fix_applied && f.id);
      if (!fixable.length) { alert('No auto-fixable findings remaining.'); return; }
      document.getElementById('modal-title').textContent = '🔍 Dry-Run Preview';
      document.getElementById('modal-body').textContent = 'Running preview…';
      document.getElementById('modal-results').style.display = 'none';
      document.getElementById('modal-actions').innerHTML =
        `<button class="btn-cancel" onclick="closeModal()">Close</button>`;
      document.getElementById('modal-backdrop').classList.add('open');
      try {
        const res = await apiFetch('/api/fix/apply', {
          method: 'POST',
          body: JSON.stringify({ finding_ids: fixable.map(f => f.id), dry_run: true })
        });
        const data = await res.json();
        document.getElementById('modal-body').textContent =
          `${data.would_fix} finding${data.would_fix !== 1 ? 's' : ''} would be fixed — ${fmt(data.total_monthly_savings)}/month recovered:`;

        document.getElementById('modal-results').style.display = 'block';

        document.getElementById('modal-actions').innerHTML =
          `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
           <button class="btn-confirm" onclick="closeModal();autoFixAll()">⚡ Apply All Fixes</button>`;
      } catch (e) {
        document.getElementById('modal-body').textContent = 'Preview failed. Please try again.';
      }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
      document.getElementById('modal-actions').innerHTML =
        `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
         <button class="btn-confirm" id="confirm-btn" onclick="applyFixes()">Confirm</button>`;
    }

    async function applyFixes() {
      const confirmBtn = document.getElementById('confirm-btn');
      if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = 'Applying…'; }

      const idsToFix = pendingFindingIds.length ? pendingFindingIds : [...selectedIds];
      if (!idsToFix.length) { closeModal(); return; }

      try {
        const res = await apiFetch('/api/fix/apply', {
          method: 'POST',
          body: JSON.stringify({ finding_ids: idsToFix })
        });

        if (res && res.ok) {
          const data = await res.json();
          const applied = data.applied || 0;
          const failed = data.failed || 0;
          const savedMo = data.total_savings_monthly || 0;

          // Build per-finding result rows in the modal
          const resultRows = (data.results || []).map(r => {
            const icon = r.success ? '✓' : '✗';
            const color = r.success ? '#10b981' : '#f87171';
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1f2937;gap:8px;">
              <span style="font-size:12px;">${icon} <span style="color:#9ca3af;font-family:monospace;">${r.resource_id || r.id}</span></span>
              <span style="font-size:12px;color:${color};flex-shrink:0;">${r.success ? (fmt(r.monthly_savings) + '/mo') : (r.reason || 'skipped')}</span>
            </div>`;
          }).join('');

          document.getElementById('modal-title').textContent = `${applied > 0 ? '✓' : '⚠️'} Fix Results`;
          document.getElementById('modal-body').innerHTML =
            `<strong style="color:#10b981;">${applied} applied</strong>, ${failed} skipped — <strong style="color:#10b981;">${fmt(savedMo)}/mo</strong> recovered.`;
          document.getElementById('modal-results').innerHTML = resultRows;
          document.getElementById('modal-results').style.display = 'block';
          document.getElementById('modal-actions').innerHTML =
            `<button class="btn-confirm" onclick="closeModal()">Done</button>`;

          // Visually mark fixed rows
          (data.results || []).filter(r => r.success).forEach(r => {
            const row = document.getElementById(`row-${r.id}`);
            if (row) {
              row.classList.add('row-fixed');
              const lastCell = row.querySelector('td:last-child');
              if (lastCell) lastCell.innerHTML = `<span style="color:var(--green);font-size:12px;font-weight:600;">✓ Fixed</span>`;
            }
          });

          // Update allFindings fixed state
          (data.results || []).filter(r => r.success).forEach(r => {
            const f = allFindings.find(x => x.id === r.id);
            if (f) f.fix_applied = 1;
          });

          // Clear selection
          idsToFix.forEach(id => selectedIds.delete(id));
          pendingFindingIds = [];
          updateActionBar();

          // Hide auto-fix panel if nothing left to fix
          const remainingFixable = allFindings.filter(f => f.fix_available && !f.fix_applied && f.id);
          if (!remainingFixable.length) {
            const panel = document.getElementById('autofix-panel');
            if (panel) panel.style.display = 'none';
          }

          // Show top-level success banner
          const banner = document.getElementById('success-banner');
          if (banner) {
            banner.textContent = `⚡ ${applied} fix${applied !== 1 ? 'es' : ''} applied — ${fmt(savedMo)}/month recovered!`;
            banner.style.display = 'block';
            banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        } else {
          const errData = res ? await res.json().catch(() => ({})) : {};
          document.getElementById('modal-body').textContent = errData.error || errData.message || 'Failed to apply fixes. Please try again.';
          if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = 'Retry'; }
        }
      } catch (e) {
        document.getElementById('modal-body').textContent = 'Network error. Please try again.';
        if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = 'Retry'; }
      }
    }

    function toggleSection(id) {

    function renderReport(data) {
      const container = document.getElementById('report-container');

      const status = (data.status || '').toLowerCase();
      if (status === 'failed') {
        container.innerHTML = `
          <div class="failed-state">
            <h2>⚠️ Audit Failed</h2>
            <p>${data.error || data.message || 'This audit encountered an error and could not complete.'}</p>
            <a href="/savings/app/audit.html" class="btn-retry">Try again →</a>
          </div>
        `;
        return;
      }

      // Handle both API shapes:
      // /report endpoint → { audit, summary, findings_by_category, ai_summary }
      // /api/audit/:id   → flat audit row with findings[]
      const auditRow = data.audit || data;
      const date = auditRow.started_at || auditRow.created_at || auditRow.date || auditRow.completedAt;
      const dateStr = date ? new Date(date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) : 'Unknown date';
      const account = auditRow.account_id || auditRow.accountId || '—';
      const regionCount = auditRow.regions_scanned || auditRow.regionCount || auditRow.regions?.length || '—';
      const resourcesScanned = auditRow.resources_scanned ?? auditRow.resourcesScanned ?? '—';
      const monthlySavings = (data.summary && data.summary.total_monthly) ?? auditRow.total_waste_monthly ?? auditRow.total_monthly_savings ?? auditRow.monthly_waste ?? null;

      // Convert findings_by_category (object) OR findings[] (array) → normalised category array
      let findingCats = [];
      if (data.findings_by_category && typeof data.findings_by_category === 'object') {
        findingCats = Object.entries(data.findings_by_category)
          .filter(([, items]) => Array.isArray(items) && items.length > 0)
          .map(([catKey, items]) => ({ category: catKey, items }));
      } else {
        const flat = data.findings || [];
        if (Array.isArray(flat) && flat.length > 0) {
          // flat array of finding objects — group by category
          const bycat = {};
          flat.forEach(f => {
            const k = f.category || 'other';
            if (!bycat[k]) bycat[k] = [];
            bycat[k].push(f);
          });
          findingCats = Object.entries(bycat).map(([k, v]) => ({ category: k, items: v }));
        }
      }

      const totalFindings = findingCats.reduce((s, c) => s + c.items.length, 0);

      // Auto-fixable categories (backed by AWS SDK actions in fix.js)
      const AUTO_FIXABLE = new Set(['ec2_idle','ebs_unattached','snapshot_old','elastic_ip_unused']);

      // Collect all individual findings
      allFindings = [];
      findingCats.forEach(cat => {
        cat.items.forEach(item => {
          allFindings.push({
            ...item,
            id: item.id,
            category: item.category || cat.category,
            monthly_cost: Number(item.monthly_cost || item.monthlyCost || 0),
            severity: item.severity || 'low',
            fix_available: item.fix_available !== undefined ? item.fix_available : (AUTO_FIXABLE.has(item.category || cat.category) ? 1 : 0),
          });
        });
      });

      // Pre-select all high-severity, auto-fixable findings
      allFindings.forEach(f => {
        if ((f.severity || '').toLowerCase() === 'high' && f.fix_available && !f.fix_applied) {
          selectedIds.add(f.id);
        }
      });

      const fixableFindings = allFindings.filter(f => f.fix_available && !f.fix_applied && f.id);
      const fixableSavings = fixableFindings.reduce((s, f) => s + f.monthly_cost, 0);

      const findingsSections = findingCats.map((cat, idx) => {
        const catName = cat.category || `Category ${idx + 1}`;
        const icon = getCategoryIcon(catName);
        const items = cat.items;
        const catWaste = items.reduce((sum, i) => sum + Number(i.monthly_cost || i.monthlyCost || 0), 0);
        const sectionId = `cat-${idx}`;

        const CATEGORY_LABELS = {
          ec2_idle: 'Idle EC2 Instances',
          ebs_unattached: 'Unattached EBS Volumes',
          snapshot_old: 'Old Snapshots',
          elastic_ip_unused: 'Unused Elastic IPs',
          rds_oversized: 'Oversized RDS Instances',
          s3_inactive: 'Inactive S3 Buckets',
          reserved_instance_opportunity: 'Reserved Instance Opportunities',
          savings_plan_opportunity: 'Savings Plan Opportunities',
          ec2_rightsizing: 'EC2 Rightsizing',
          lambda_rightsizing: 'Lambda Rightsizing',
          tag_coverage: 'Tag Coverage Issues',
          cost_anomaly: 'Cost Anomalies',
        };
        const friendlyCatName = CATEGORY_LABELS[catName] || catName.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());

        const rows = items.map(item => {
          const fId = item.id;
          if (!fId) return ''; // skip items without DB id — can't be fixed
          const isHigh = (item.severity || '').toLowerCase() === 'high';
          const isFixable = item.fix_available !== undefined ? item.fix_available : AUTO_FIXABLE.has(item.category || cat.category);
          const isAlreadyFixed = item.fix_applied;
          const fixCell = isAlreadyFixed
            ? `<span style="color:var(--green);font-size:12px;font-weight:600;">✓ Fixed</span>`
            : isFixable
              ? `<input type="checkbox" id="cb-${fId}" data-id="${fId}" data-cost="${item.monthly_cost || 0}"

              : `<span style="color:var(--muted);font-size:11px;" title="Requires manual action in cloud console">Manual</span>`;
          return `
            <tr id="row-${fId}" class="${isAlreadyFixed ? 'row-fixed' : ''}">
              <td class="mono" style="font-size:12px;">${item.resource_id || '—'}</td>
              <td style="font-size:13px;">${item.resource_name || item.name || '—'}</td>

            </tr>

              <span class="category-name">${friendlyCatName}</span>

              <span class="category-waste">${fmt(catWaste)}/mo</span>
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="findings-body open" id="body-${sectionId}">
              <div style="overflow-x:auto;">
                <table>
                  <thead>
                    <tr>
                      <th>Resource ID</th>
                      <th>Name</th>
                      <th>Region</th>
                      <th>Monthly Cost</th>
                      <th>Severity</th>
                      <th style="text-align:center;">Auto-Fix</th>
                    </tr>
                  </thead>
                  <tbody>${rows || '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:20px;">No findings in this category</td></tr>'}</tbody>
                </table>
              </div>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = `
        <div id="success-banner" class="success-banner"></div>
        <div id="error-banner" class="error-banner"></div>

        <div class="report-header">
          <h1>Savings Audit Report</h1>
          <div class="report-meta">
            <span>📅 ${dateStr}</span>
            <span>☁️ ${account}</span>
            <span>🗺️ ${regionCount} region${regionCount !== 1 ? 's' : ''} scanned</span>
          </div>
          <div class="summary-chips">
            <div class="chip">
              <div class="chip-label">Resources Scanned</div>
              <div class="chip-value">${resourcesScanned}</div>
            </div>
            <div class="chip">
              <div class="chip-label">Findings</div>
              <div class="chip-value">${totalFindings}</div>
            </div>
            <div class="chip">
              <div class="chip-label">Monthly Savings</div>
              <div class="chip-value green">${fmt(monthlySavings)}</div>
            </div>
          </div>
        </div>

        <div class="ai-card">
          <div class="ai-label">🤖 AI Analysis</div>
          <div class="ai-text" id="ai-summary-text">${data.ai_summary || auditRow.ai_summary || '<div class="skeleton" style="width:90%;margin-bottom:8px;"></div><div class="skeleton" style="width:75%;"></div>'}</div>
        </div>

        ${fixableFindings.length > 0 ? `
          <div id="autofix-panel" style="background:linear-gradient(135deg,#0d2240 0%,#0a1628 100%);border:2px solid var(--cyan);border-radius:16px;padding:24px 28px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">

              <div style="font-size:14px;color:var(--muted);">
                <strong style="color:var(--cyan);">${fixableFindings.length} finding${fixableFindings.length !== 1 ? 's' : ''}</strong> can be fixed automatically
                &nbsp;·&nbsp; <strong style="color:var(--green);">${fmt(fixableSavings)}/month</strong> recoverable

      if (!auditId) {
        document.getElementById('report-container').innerHTML = `
          <div style="color:var(--red);padding:40px 0;">
            No audit ID specified. <a href="/savings/app/dashboard.html" style="color:var(--cyan);">Go to Dashboard</a>
          </div>
        `;
        return;
      }

      try {
        // Fetch both report data and activation data in parallel
        const [reportRes, activationRes] = await Promise.all([
          apiFetch(`/api/audit/${auditId}/report`),
          apiFetch(`/api/audit/${auditId}`)
        ]);

        if (!reportRes || !reportRes.ok) {
          if (!activationRes || !activationRes.ok) {
            document.getElementById('report-container').innerHTML = `
              <div class="failed-state">
                <h2>⚠️ Report Not Found</h2>
                <p>Could not load this audit report. It may still be processing.</p>
                <a href="/savings/app/dashboard.html" class="btn-retry">Back to Dashboard</a>
              </div>
            `;
            return;
          }
          const data2 = await activationRes.json();
          renderReport(data2);
          renderActivationPanel(data2);
          return;
        }

        const [reportData, activationData] = await Promise.all([
          reportRes.json(),
          activationRes ? activationRes.json().catch(() => null) : null
        ]);

        renderReport(reportData);
        renderActivationPanel(activationData);
      } catch (e) {
        document.getElementById('report-container').innerHTML = `
          <div class="failed-state">
            <h2>⚠️ Error Loading Report</h2>
            <p>Network error. Please try again.</p>
            <a href="/savings/app/dashboard.html" class="btn-retry">Back to Dashboard</a>
          </div>
        `;
      }
    }

    (async () => {
      const user = await requireAuth();
      if (!user) return;
      document.getElementById('user-email').textContent = user.email || 'Account';
      await loadReport();
    })();
  </script>
</body>
</html>
